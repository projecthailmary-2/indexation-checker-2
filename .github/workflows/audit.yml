name: Indexation Audit

# How this runs:
#  - schedule:            once a day (the runner checks the app's On/Off flag and
#                         skips immediately if it's Off).
#  - workflow_dispatch:   manual "Run workflow" button (optional batch size).
#  - repository_dispatch:  triggered by the in-app button (event type "run-audit").
on:
  # Weekly one-burst pass: fires Mon–Thu at 6am Manila (22:00 UTC the prior day).
  # Monday's run kicks the full re-audit (chains through the whole library, ~<1
  # day); Tue–Thu are safety nets — they resume the chain if it broke, otherwise
  # everything is fresh and they idle. Nothing runs Fri–Sun, leaving Thu EOD → Fri
  # for reviewing the data. Cadence is set by FRESHNESS_DAYS (5) below.
  schedule:
    - cron: '0 22 * * 0-3'  # Sun–Wed 22:00 UTC = Mon–Thu 06:00 Manila
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'How many sites to audit this run'
        required: false
        default: '300'
      freshness_days:
        description: 'Override freshness for THIS pass (blank = weekly default 5; use 2 to force a full re-audit). The chain carries it through.'
        required: false
  repository_dispatch:
    types: [run-audit]

# Never run two audits at once; let a running one finish rather than cancel it.
concurrency:
  group: indexation-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # under GitHub's 6-hour job ceiling
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run audit batch
        id: run
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_TRACKING_TAB: ${{ secrets.GOOGLE_TRACKING_TAB }}
          GOOGLE_SALVAGE_TAB: ${{ secrets.GOOGLE_SALVAGE_TAB }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          # Manual "Run workflow" input overrides as an absolute per-run size;
          # otherwise the runner takes the app's "Sites per day" (KV) and splits
          # it across RUNS_PER_DAY runs.
          BATCH_SIZE: ${{ github.event.inputs.batch_size }}
          RUNS_PER_DAY: '3'
          CHUNK_SIZE: '10'
          # Skip sites already checked within this many days. Weekly cadence:
          # re-audit sites older than 5 days — on Monday the whole prior-week
          # library is stale → full pass; Tue–Thu it's all fresh → idle. The
          # "Run workflow" freshness_days input (or a chained run's client_payload)
          # can override it for a one-off forced re-audit; scheduled runs get 5.
          FRESHNESS_DAYS: ${{ github.event.inputs.freshness_days || github.event.client_payload.freshness_days || '5' }}
          # Self-chaining: each run audits CHAIN_BATCH sites then triggers the next
          # (via GH_PAT) until the whole library is refreshed — so the 2nd/3rd/…
          # runs don't depend on the flaky cron. Cron just kicks off the first one.
          CHAIN: 'true'
          CHAIN_BATCH: '500'
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -o pipefail
          node --no-warnings scripts/run-batch.mjs 2>&1 | tee run.log
          RESULT="$(grep '^RESULT:' run.log | tail -1 || true)"
          echo "result=${RESULT:-RESULT: (no summary — see logs)}" >> "$GITHUB_OUTPUT"

      # Ping Slack only when there's something to act on: a genuine failure, OR a
      # clean stop because SerpApi ran out of credits / the key is invalid.
      # Plain successful runs and skipped (automation-off) runs stay silent.
      - name: Notify Slack
        # PAUSED 2026-07-15 (Nate) — Slack alerts silenced for now. Restore: if: always()
        if: false
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && { echo "No Slack webhook configured; skipping notification."; exit 0; }
          # Reason comes straight from the log — the run step can abort before it
          # exports an output, so don't rely on steps.run.outputs.
          RAW="$(grep '^RESULT:' run.log 2>/dev/null | tail -1 || true)"
          REASON="${RAW#RESULT: }"
          if [ "$JOB_STATUS" != "success" ]; then
            TEXT="⚠️ Indexation audit failed${REASON:+ — ${REASON}}"
          elif echo "$RAW" | grep -qiE 'STOPPED \((No Credits|Invalid Key)\)'; then
            TEXT="💳 Indexation audit stopped early — ${REASON}"
          else
            echo "Clean run — nothing to report."; exit 0
          fi
          jq -n --arg t "$TEXT" '{text:$t}' | curl -s -X POST -H 'Content-type: application/json' -d @- "$SLACK_WEBHOOK_URL"
