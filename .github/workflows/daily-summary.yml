name: Daily Summary

# Posts an indexation summary to Slack once a day at 10pm Manila, and can be run
# on demand via the "Run workflow" button. Separate from the audit runner.
on:
  # PAUSED 2026-07-15 (Nate) — nightly Slack summary silenced for now.
  # To resume: uncomment the schedule block below.
  # schedule:
  #   - cron: '0 14 * * *'   # 22:00 Manila (14:00 UTC)
  workflow_dispatch: {}

jobs:
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci --omit=dev
      - name: Post summary to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_TRACKING_TAB: ${{ secrets.GOOGLE_TRACKING_TAB }}
        run: node --no-warnings scripts/daily-summary.mjs
